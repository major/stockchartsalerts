name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2ba3a3c63e49ff6b516faad5fc6f2d # v5
        with:
          go-version: "1.26"

      - name: Check formatting
        run: make fmt

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2ba3a3c63e49ff6b516faad5fc6f2d # v5
        with:
          go-version: "1.26"

      - name: Run golangci-lint
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2ba3a3c63e49ff6b516faad5fc6f2d # v5
        with:
          go-version: "1.26"

      - name: Run tests
        run: make test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2ba3a3c63e49ff6b516faad5fc6f2d # v5
        with:
          go-version: "1.26"

      - name: Enforce 95% line coverage
        run: make coverage

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.out
          fail_ci_if_error: true

  doc:
    name: Doc
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2ba3a3c63e49ff6b516faad5fc6f2d # v5
        with:
          go-version: "1.26"

      - name: Check documentation
        run: make doc

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2ba3a3c63e49ff6b516faad5fc6f2d # v5
        with:
          go-version: "1.26"

      - name: Build binary
        run: make build

  container:
    needs:
      - fmt
      - lint
      - test
      - coverage
      - doc
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          file: Containerfile
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          outputs: type=image,name=target,annotation-index.org.opencontainers.image.description=Stock Charts Alerts Bot
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout homehosted repository
        if: github.ref == 'refs/heads/main'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: major/homehosted
          token: ${{ secrets.HOMEHOSTED_PAT }}
          path: homehosted

      - name: Configure git
        if: github.ref == 'refs/heads/main'
        working-directory: homehosted
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update deployment manifest
        if: github.ref == 'refs/heads/main'
        working-directory: homehosted
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          sed -i "s|tag: latest@sha256:.*|tag: latest@${DIGEST}|g" apps/stockchartsalerts/helm/helmrelease.yaml

      - name: Commit and push changes
        if: github.ref == 'refs/heads/main'
        working-directory: homehosted
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add apps/stockchartsalerts/helm/helmrelease.yaml
            git commit -m "🤖 Update stockchartsalerts deployment to ${DIGEST}"
            git push
          fi
