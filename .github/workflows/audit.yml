name: Security audit

on:
  push:
    branches:
      - main
    paths:
      - "**/go.mod"
      - "**/go.sum"
  pull_request:
    paths:
      - "**/go.mod"
      - "**/go.sum"
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2ba3a3c63e49ff6b516faad5fc6f2d # v5
        with:
          go-version: "1.26"

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
